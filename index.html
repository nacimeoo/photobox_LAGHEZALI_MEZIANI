<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>index td8 : fetch</title>
	<link rel="stylesheet" href="css/index.css">
</head>

<body>
	<main id="photo">

		<div id="navigation">
			<button id="btn-first">first</button>
			<button id="btn-prev">prev</button>
			<button id="btn-load">load</button>
			<button id="btn-next">next</button>
			<button id="btn-last">last</button>
		</div>

		<section id="la_galerie"></section>

		<section id="la_photo"></section>
	</main>

	<script id="photoTemplate" type="text/x-handlebars-template">
	<img src="{{url}}" alt="{{title}}">
	<h4>{{title}}</h4>
	<p>{{description}}</p>
	<p>{{type}}, {{defX}} x {{defY}}</p>
	<h4 id="la_categorie">categorie : {{category}}</h4>
	<h4>commentaires : </h4>
	<ul id="les_commentaires">
	{{#each comments}}
		<li>{{pseudo}} : {{comment}}</li>
	{{/each}}
	</ul>

</script>

	<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
	<script src='js/index.js' defer></script>
</body>

</html>
